name: Sync main → develop

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Open back-sync PR if not already open
        run: |
          existing=$(gh pr list --head main --base develop --state open --json number --jq '.[0].number')
          if [[ -n "$existing" ]]; then
            echo "Back-sync PR #$existing already open, skipping."
            exit 0
          fi
          gh pr create \
            --title "chore: sync main → develop" \
            --body "Automatic back-merge of \`main\` into \`develop\` to keep branches in sync after a production release." \
            --head main \
            --base develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
