# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy - dev-reactnatives

on:
  workflow_dispatch:
  push:
    branches:
      - develop
    paths:
      - site/**

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Enable Corepack and activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: site

      - name: Build
        run: pnpm run build
        working-directory: site

      - name: Prepare deployment package
        run: |
          mkdir -p site/deploy
          cp -R site/dist/. site/deploy/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            site/deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: site

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6DC2B095E0F5418CB8785EA4521FC24A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_787FA9529C3942F08526946811155015 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4B110BCC5BA94D599A48D26D1894AC2E }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'dev-reactnatives'
          slot-name: 'Production'
          package: ./site
          startup-command: 'pm2 serve /home/site/wwwroot --no-daemon --spa'
